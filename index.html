<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Transcriber</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-6">

    <div class="max-w-2xl w-full bg-gray-800 rounded-xl shadow-2xl p-8 border border-gray-700">
        <h1 class="text-3xl font-bold mb-2 text-center text-blue-400">Audio/Video Transcriber</h1>
        <p class="text-gray-400 text-center mb-8">Upload a file or paste a URL to generate text.</p>

        <form id="transcribeForm" class="space-y-6">
            
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Media URL</label>
                <input type="url" id="mediaUrl" placeholder="https://example.com/audio.mp3" 
                       class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <div class="flex items-center justify-center w-full">
                <span class="text-gray-500 font-bold uppercase text-sm">OR</span>
            </div>

            <div id="dropZone" class="flex items-center justify-center w-full">
                <label for="fileUpload" class="flex flex-col items-center justify-center w-full h-40 border-2 border-gray-600 border-dashed rounded-lg cursor-pointer bg-gray-700 hover:bg-gray-600 transition">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6">
                        <svg class="w-8 h-8 mb-4 text-gray-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 16">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2"/>
                        </svg>
                        <p class="mb-2 text-sm text-gray-400"><span class="font-semibold text-blue-400">Click to upload</span> or drag and drop</p>
                        <p class="text-xs text-gray-500" id="fileNameDisplay">Audio/Video files only</p>
                    </div>
                    <input id="fileUpload" type="file" class="hidden" accept="audio/*,video/*" />
                </label>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition flex justify-center items-center">
                <span id="btnText">Transcribe Media</span>
                <svg id="spinner" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <div id="resultSection" class="hidden mt-8 pt-6 border-t border-gray-700">
            <h3 class="text-lg font-semibold text-gray-300 mb-3">Transcript:</h3>
            <div class="bg-gray-700 p-4 rounded-lg text-gray-200 min-h-[100px] mb-4" id="transcriptText"></div>
            <button id="copyBtn" class="text-sm bg-gray-600 hover:bg-gray-500 px-4 py-2 rounded transition">
                Copy to Clipboard
            </button>
        </div>
    </div>

    <script>
        const form = document.getElementById('transcribeForm');
        const fileInput = document.getElementById('fileUpload');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        const resultSection = document.getElementById('resultSection');
        const transcriptText = document.getElementById('transcriptText');
        const copyBtn = document.getElementById('copyBtn');

        // Update file display name when selected
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileNameDisplay.textContent = e.target.files[0].name;
            } else {
                fileNameDisplay.textContent = "Audio/Video files only";
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const url = document.getElementById('mediaUrl').value;
            const file = fileInput.files[0];

            if (!url && !file) return alert("Please provide a file or URL.");

            // UI Loading state
            btnText.textContent = "Processing...";
            spinner.classList.remove('hidden');
            submitBtn.disabled = true;
            resultSection.classList.add('hidden');

            const formData = new FormData();
            if (file) formData.append('audioFile', file);
            if (url) formData.append('url', url);

            try {
                // Determine fetch logic based on URL vs File upload
                let fetchOptions = {};
                if (file) {
                    fetchOptions = { method: 'POST', body: formData };
                } else {
                    fetchOptions = {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url })
                    };
                }

                const response = await fetch('/api/transcribe', fetchOptions);
                const data = await response.json();

                if (data.success) {
                    transcriptText.textContent = data.text;
                    resultSection.classList.remove('hidden');
                } else {
                    alert(data.error || "An error occurred.");
                }
            } catch (err) {
                alert("Failed to connect to the server.");
            } finally {
                // Reset UI
                btnText.textContent = "Transcribe Media";
                spinner.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });

        // Copy functionality
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(transcriptText.textContent);
            copyBtn.textContent = "Copied!";
            setTimeout(() => { copyBtn.textContent = "Copy to Clipboard"; }, 2000);
        });
    </script>
</body>
</html>
